# ── tmux configuration ───────────────────────────────────────────────
# Prefix stays Ctrl-b. Remember: press Ctrl+b, RELEASE, then the next key.

# Reload this file with:  prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Mouse support: click a pane to focus it, drag the border to resize,
# scroll to look back through history, click a window name to switch.
set -g mouse on

# ── Splitting panes ──────────────────────────────────────────────────
# The defaults (prefix + % and prefix + ") still work, but these are
# easier and open the new pane in the SAME directory as the current one.
#   prefix + |   -> vertical split (panes side by side)
#   prefix + -   -> horizontal split (panes stacked)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# No-modifier fallbacks (handy on a French keyboard where | needs Option):
#   prefix + v   -> vertical split      prefix + b -> horizontal split
bind v split-window -h -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"

# Move between panes with prefix + arrow keys (this is already the default).

# Start numbering windows/panes at 1 instead of 0 (easier to reach).
set -g base-index 1
setw -g pane-base-index 1

# ── Pane borders ─────────────────────────────────────────────────────
# Thicker border lines (single is the thin default). Options: single,
# double, heavy, simple, number. "heavy" reads clearly without being noisy.
set -g pane-border-lines heavy
# Colours matched to WezTerm's rose-pine-moon theme:
#   inactive panes -> dim/muted so they recede
#   active pane    -> bright iris accent so focus is obvious
set -g pane-border-style "fg=#44415a"
set -g pane-active-border-style "fg=#c4a7e7,bold"
# Briefly flash big arrows over the active border when focus changes.
set -g pane-border-indicators arrows

# ── Selection highlight (copy-mode / mouse drag) ─────────────────────
# tmux (with mouse on) draws the selection itself; make it clearly visible
# and matched to WezTerm's selection colour.
set -g mode-style "bg=#c4a7e7,fg=#232136"

# ── Auto-copy on mouse selection: ONLY in Claude Code panes ──────────
# On drag-release, copy to the system clipboard only if the pane is running
# Claude Code. It shows up as "claude" OR as its version-named binary
# (e.g. 2_1_198), so we match "claude" or any command starting with a digit
# (no shell/editor does). In shells and other apps the drag just selects —
# nothing is copied (press Enter/y to copy manually, or q to dismiss).
bind -T copy-mode-vi MouseDragEnd1Pane if-shell -F '#{||:#{m:*claude*,#{pane_current_command}},#{m:[0-9]*,#{pane_current_command}}}' 'send-keys -X copy-pipe-and-cancel' 'send-keys -X stop-selection'
bind -T copy-mode    MouseDragEnd1Pane if-shell -F '#{||:#{m:*claude*,#{pane_current_command}},#{m:[0-9]*,#{pane_current_command}}}' 'send-keys -X copy-pipe-and-cancel' 'send-keys -X stop-selection'

# A plain left-click exits copy-mode immediately so you can type again right
# away (drag-to-select still works — that uses MouseDrag1Pane, a different event).
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X cancel
bind -T copy-mode    MouseDown1Pane select-pane \; send-keys -X cancel

# Slower, finer scroll: 3 lines per wheel tick instead of the jumpy default.
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 3 scroll-down
bind -T copy-mode    WheelUpPane   send-keys -X -N 3 scroll-up
bind -T copy-mode    WheelDownPane send-keys -X -N 3 scroll-down
