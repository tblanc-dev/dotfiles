# ── tmux configuration ───────────────────────────────────────────────
# Prefix stays Ctrl-b. Remember: press Ctrl+b, RELEASE, then the next key.

# Reload this file with:  prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Mouse support: click a pane to focus it, drag the border to resize,
# scroll to look back through history, click a window name to switch.
set -g mouse on

# ── Splitting panes ──────────────────────────────────────────────────
# The defaults (prefix + % and prefix + ") still work, but these are
# easier and open the new pane in the SAME directory as the current one.
#   prefix + |   -> vertical split (panes side by side)
#   prefix + -   -> horizontal split (panes stacked)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# No-modifier fallbacks (handy on a French keyboard where | needs Option):
#   prefix + v   -> vertical split      prefix + b -> horizontal split
bind v split-window -h -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"

# Move between panes with prefix + arrow keys (this is already the default).

# Start numbering windows/panes at 1 instead of 0 (easier to reach).
set -g base-index 1
setw -g pane-base-index 1

# ── Pane borders ─────────────────────────────────────────────────────
# Thicker border lines (single is the thin default). Options: single,
# double, heavy, simple, number. "heavy" reads clearly without being noisy.
set -g pane-border-lines heavy
# Colours matched to WezTerm's rose-pine-moon theme:
#   inactive panes -> dim/muted so they recede
#   active pane    -> bright iris accent so focus is obvious
set -g pane-border-style "fg=#44415a"
set -g pane-active-border-style "fg=#c4a7e7,bold"
# Briefly flash big arrows over the active border when focus changes.
set -g pane-border-indicators arrows
